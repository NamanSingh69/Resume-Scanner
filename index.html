<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume ATS Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Required for Client-Side PDF Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <!-- Gemini Client Resolver -->
    <script src="/static/gemini-client.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --text: #e8e8f0;
            --text-muted: #8888a0;
            --success: #00d68f;
            --warning: #ffaa00;
            --danger: #ff4d6a;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f url('/static/bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        /* Mobile-friendly container */
        .container {
            width: 100%;
            max-width: 720px;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(18, 18, 26, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(26, 26, 46, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(26, 26, 46, 0.8);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(26, 26, 46, 0.5);
            backdrop-filter: blur(4px);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
            transform: translateY(-2px);
        }

        .drop-zone input {
            display: none;
        }

        .drop-zone .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .drop-zone .hint {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .file-name {
            color: var(--accent);
            font-weight: 500;
            margin-top: 0.5rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Results */
        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .score-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
            position: relative;
        }

        .score-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(var(--score-color) calc(var(--score) * 3.6deg), var(--surface-2) 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .metric {
            background: var(--surface-2);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .metric .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .metric .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 1.5rem 0 0.75rem;
        }

        .feedback-item {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--surface-2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: var(--danger);
            padding: 1rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📄 Resume ATS Scanner</h1>
        <p class="subtitle">AI-powered resume analysis against job descriptions</p>

        <form id="ats-form">
            <div class="card">
                <label for="job-desc">Job Description</label>
                <textarea id="job-desc" placeholder="Paste the job description here..." required></textarea>
            </div>

            <div class="card">
                <label>Resume Upload</label>
                <div class="drop-zone" id="drop-zone">
                    <input type="file" id="resume-file" accept=".pdf,.png,.jpg,.jpeg,.txt">
                    <div class="icon">📎</div>
                    <div>Drop resume here or <strong>click to browse</strong></div>
                    <div class="hint">PDF, PNG, JPG, or TXT (max 10MB)</div>
                    <div class="file-name" id="file-name"></div>
                </div>
            </div>

            <button type="submit" id="submit-btn">🔍 Analyze Resume</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Analyzing your resume with AI...</div>
        </div>

        <div class="results" id="results">
            <div class="card">
                <div class="score-ring" id="score-ring">
                    <span id="score-text">—</span>
                </div>
                <div class="metric-grid" id="metrics"></div>
            </div>
            <div class="card">
                <div class="section-title">AI Feedback</div>
                <div id="feedback"></div>
            </div>
            <div class="card">
                <div class="section-title">Keywords Found</div>
                <div id="keywords" style="font-size:0.9rem; line-height:1.8;"></div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('resume-file');
        const fileNameEl = document.getElementById('file-name');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                fileNameEl.textContent = e.dataTransfer.files[0].name;
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) fileNameEl.textContent = fileInput.files[0].name;
        });

        document.getElementById('ats-form').addEventListener('submit', async e => {
            e.preventDefault();
            const jobDesc = document.getElementById('job-desc').value;
            const file = fileInput.files[0];
            if (!file) { alert('Please upload a resume'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            document.getElementById('loading').classList.add('show');
            document.getElementById('results').classList.remove('show');

            // Try to extract text, fallback to a message if it fails
            let resumeText = "Could not extract text from file.";
            try {
                if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
                    resumeText = await extractTextFromPDF(file);
                } else {
                    resumeText = await file.text();
                }
            } catch (err) {
                console.error("File read error:", err);
                alert("Failed to read the uploaded file.");
                btn.disabled = false;
                document.getElementById('loading').classList.remove('show');
                return;
            }

            const systemPrompt = `You are an expert ATS (Applicant Tracking System) and senior technical recruiter. 
Analyze the provided resume against the job description.
Return ONLY a raw JSON object with this exact structure:
{
  "ats_score": number (0-100 overall match score),
  "component_scores": { "Skills Match": number, "Experience": number, "Formatting": number },
  "ai_feedback": ["Specific actionable point 1", "Point 2", "Point 3"],
  "matched_keywords": ["keyword1", "keyword2"],
  "missing_keywords": ["keyword1", "keyword2"]
}`;

            const userPrompt = `JOB DESCRIPTION:\n${jobDesc}\n\nRESUME TEXT:\n${resumeText}`;

            try {
                // Call the actual Gemini API using the selected model
                const responseText = await window.gemini.generateContent(userPrompt, systemPrompt);
                
                // Parse the JSON response (strip markdown code blocks if Gemini added them)
                let cleanJson = responseText.trim();
                if (cleanJson.startsWith('```json')) {
                    cleanJson = cleanJson.replace(/```json\n?/, '').replace(/```\n?$/, '');
                }
                
                const data = JSON.parse(cleanJson);
                renderResults(data);
                
            } catch (err) {
                console.error("Gemini Error:", err);
                alert(`Analysis failed: ${err.message}. Please check your API key in the Gemini settings (bottom right).`);
            } finally {
                btn.disabled = false;
                document.getElementById('loading').classList.remove('show');
            }
        });

        // PDF Extraction Helper
        async function extractTextFromPDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        let text = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(item => item.str).join(" ") + "\n";
                        }
                        resolve(text);
                    } catch (e) {
                        reject(e);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function renderResults(data) {
            const score = Math.round(data.ats_score || 0);
            const color = score >= 70 ? 'var(--success)' : score >= 40 ? 'var(--warning)' : 'var(--danger)';

            const ring = document.getElementById('score-ring');
            ring.style.setProperty('--score', score);
            ring.style.setProperty('--score-color', color);
            document.getElementById('score-text').textContent = score;
            document.getElementById('score-text').style.color = color;

            const metrics = document.getElementById('metrics');
            metrics.innerHTML = Object.entries(data.component_scores || {}).map(([k, v]) =>
                `<div class="metric"><div class="value" style="color:${v >= 60 ? 'var(--success)' : 'var(--warning)'}">${Math.round(v)}%</div><div class="label">${k}</div></div>`
            ).join('');

            const feedback = document.getElementById('feedback');
            const items = data.ai_feedback || data.suggestions || ['No AI feedback available'];
            feedback.innerHTML = (Array.isArray(items) ? items : [items]).map(f =>
                `<div class="feedback-item">${f}</div>`
            ).join('');

            const keywords = document.getElementById('keywords');
            const matched = data.matched_keywords || [];
            const missing = data.missing_keywords || [];
            keywords.innerHTML =
                matched.map(k => `<span style="background:rgba(0,214,143,0.15);color:var(--success);padding:4px 10px;border-radius:6px;margin:3px;display:inline-block;">✓ ${k}</span>`).join('') +
                missing.map(k => `<span style="background:rgba(255,77,106,0.15);color:var(--danger);padding:4px 10px;border-radius:6px;margin:3px;display:inline-block;">✗ ${k}</span>`).join('');

            document.getElementById('results').classList.add('show');
        }

        // Initialize Gemini UI
        window.addEventListener('DOMContentLoaded', () => {
            if (window.gemini) {
                window.gemini.injectUI();
            }
        });
    </script>
</body>

</html>
